<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – FitCore Gym</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/signup.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
</head>
<body>

<section class="signup-section">
  <div class="signup-container">

    <div class="signup-left">
      <div class="left-content">
        <h1>Join FitCore</h1>
        <p>Start your transformation today. Stronger every day.</p>
        <button class="admin-dashboard-btn" onclick="goToAdmin()">Admin Dashboard</button>
      </div>
    </div>

    <div class="signup-right">
      <form class="signup-form">
        <h2>Create Account</h2>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create password" required>
        </div>
        <div class="form-group">
          <label>Membership Plan</label>
          <select required>
            <option value="">Select Plan</option>
            <option>Basic</option>
            <option>Standard</option>
            <option>Premium</option>
          </select>
        </div>
        <button type="submit" class="signup-btn">Sign Up</button>
        <p class="login-link">Already a member? <a href="login.html">Login</a></p>
      </form>
    </div>

  </div>
</section>

<script src="../assets/js/main.js"></script>
</body>
</html>
